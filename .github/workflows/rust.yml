name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.30.x'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libbsd-dev uuid-dev build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --features embedded-driver

      - name: Test
        run: cargo test --features embedded-driver

      - name: Clippy
        run: cargo clippy --features embedded-driver -- -D warnings

      - name: Build benchmarks
        run: cargo build --benches --features embedded-driver

      - name: Build allocation benchmarks
        run: cargo build --benches --features embedded-driver,dhat-heap

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check
