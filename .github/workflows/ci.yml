name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libbsd-dev uuid-dev
          wget https://github.com/Kitware/CMake/releases/download/v3.31.5/cmake-3.31.5-linux-x86_64.sh -q -O /tmp/cmake-install.sh
          chmod +x /tmp/cmake-install.sh
          sudo /tmp/cmake-install.sh --prefix=/usr/local --skip-license
          cmake --version

      - name: Build
        run: cargo build --features embedded-driver

      - name: Test
        run: cargo test --features embedded-driver

      - name: Clippy
        run: cargo clippy --features embedded-driver -- -D warnings

      - name: Build benchmarks
        run: cargo build --benches --features embedded-driver

      - name: Build allocation benchmarks
        run: cargo build --benches --features embedded-driver,dhat-heap

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check
